<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
<meta name="description" content="{{ site.description }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

<header class="site-header">
  <a class="brand" href="{{ '/' | relative_url }}">andrew<span>.</span>b</a>
  <nav class="site-nav">
    <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a>
    <a href="{{ '/writeups.html' | relative_url }}" {% if page.url == '/writeups.html' %}class="active"{% endif %}>Writeups</a>
    <a href="{{ '/' | relative_url }}#labs">Labs &amp; Certs</a>
    <a href="{{ '/' | relative_url }}#contact">Contact</a>
  </nav>
</header>

{{ content }}

<footer class="site-footer">
  &copy; {{ 'now' | date: "%Y" }} Andrew Bonetello &mdash; built &amp; deployed on GitHub Pages
</footer>

</body>
</html>
